# Configuración de build de Netlify para este sitio estático.
# El comando ejecuta bust.py antes de publicar, reemplazando __BUST__
# en los HTML por un timestamp único para invalidar el cache del browser.

[build]
  publish = "."
  command = "python3 bust.py"

# Netlify Functions (Meta Conversions API server-side)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Los PDFs premium se empaquetan con las functions para que `descargar`
  # pueda servirlos tras verificar el pago. No se acceden directo desde la web.
  included_files = ["contenido/*.pdf"]

# Headers y redirects de seguridad siguen viniendo de los archivos
# _headers y _redirects. Los redirects de abajo protegen los PDFs.

# ============================================
# Protección de PDFs: descarga directa solo desde el sitio.
# Si alguien entra al PDF con un Referer externo (o sin Referer),
# se lo manda a la landing de captura. Las descargas internas
# desde /gracias/ traen Referer del propio dominio y pasan directo.
# force = true es obligatorio: como el PDF existe como archivo,
# sin force el archivo siempre gana y el redirect nunca dispara.
# ============================================

[[redirects]]
  from = "/descargables/auditoria_consultoria_marketing_express_campanas_mc.pdf"
  to = "/recursos/auditoria-marketing-express.html"
  status = 302
  force = true
  conditions = {Referer = ["!https://marianocalandra.com/*", "!https://www.marianocalandra.com/*"]}

[[redirects]]
  from = "/descargables/manual_gtm_ga4_mc_descarga_gratis.pdf"
  to = "/recursos/manual-gtm-ga4.html"
  status = 302
  force = true
  conditions = {Referer = ["!https://marianocalandra.com/*", "!https://www.marianocalandra.com/*"]}

[[redirects]]
  from = "/descargables/guia_inicial_paid_media_mc_descarga_gratis.pdf"
  to = "/recursos/guia-paid-media.html"
  status = 302
  force = true
  conditions = {Referer = ["!https://marianocalandra.com/*", "!https://www.marianocalandra.com/*"]}

# ============================================
# Contenido premium: los PDFs pagos NO se sirven directo.
# La descarga real pasa por /.netlify/functions/descargar, que valida el
# pago contra Mercado Pago antes de entregar el archivo. Cualquier acceso
# directo a la URL del PDF rebota siempre a la página de detalle del producto.
# ============================================

[[redirects]]
  from = "/contenido/100_Hooks_que_Convierten_Mariano_Calandra.pdf"
  to = "/contenido/100-hooks-que-convierten.html"
  status = 302
  force = true

[[redirects]]
  from = "/contenido/135_Prompts_Estrategia_Negocios_Mariano_Calandra.pdf"
  to = "/contenido/pack-prompts.html"
  status = 302
  force = true

[[redirects]]
  from = "/contenido/Paid-Media-Sin-Humo-ebook.pdf"
  to = "/contenido/ebook-paid-media-sin-humo.html"
  status = 302
  force = true
