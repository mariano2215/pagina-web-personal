<style>
:root{
  --bg:#EDEDE8; --ink:#1A1A18; --ink-soft:#5C5C57; --ink-faint:#9A9A93;

*{ margin:0; padding:0; box-sizing:border-box; }
html{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body{
  background:var(--bg); color:var(--ink); font-family:var(--font);
  line-height:1.5; letter-spacing:-0.01em; min-height:100svh;
  display:flex; align-items:center; justify-content:center; padding:40px 24px;
}
.thanks{ width:min(100%,640px); text-align:center; }
.badge{
  display:inline-flex; align-items:center; gap:9px; margin-bottom:28px;
  padding:8px 16px; border:1px solid var(--line); border-radius:999px;
  font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent);
}
.badge::before{
  content:"✓"; width:20px; height:20px; border-radius:50%;
  background:var(--accent); color:var(--bg); display:inline-flex;
  align-items:center; justify-content:center; font-size:12px; font-weight:800;
}
.thanks h1{
  font-size:clamp(2rem,5.4vw,3.4rem); line-height:1.05; font-weight:600;
  letter-spacing:-0.04em; margin-bottom:20px;
}
.thanks h1 em{ font-style:normal; color:var(--ink-soft); }
.thanks p{ font-size:1.05rem; color:var(--ink-soft); max-width:46ch; margin:0 auto 36px; }
.actions{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.btn{
  display:inline-flex; align-items:center; gap:9px; font-size:14px; font-weight:500;
  padding:14px 26px; border-radius:999px; border:1px solid var(--ink); transition:all .35s var(--ease);
}
.btn-solid{ background:var(--ink); color:var(--bg); }
.btn-solid:hover{ background:transparent; color:var(--ink); }
.btn-ghost{ background:transparent; color:var(--ink); border-color:var(--line); }
.btn-ghost:hover{ border-color:var(--ink); }
a.btn{ text-decoration:none; }
.micro{ font-size:13px; color:var(--ink-faint); margin-top:30px; }
.micro a{ color:var(--accent); }
