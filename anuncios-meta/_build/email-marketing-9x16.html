*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
.ad{
  width:1080px;height:1920px;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%, rgba(53,212,174,.20), transparent 44%),
    radial-gradient(circle at 8% 96%, rgba(53,212,174,.06), transparent 42%),
    #0B0B0B;
  font-family:'Poppins',sans-serif;color:#fff;
  padding:104px;display:flex;flex-direction:column;
}
.ad::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.04);pointer-events:none}
.brand{display:flex;align-items:center;gap:13px;z-index:2}
.brand img{width:46px;height:46px;border-radius:8px}
.brand .wm{font-family:'Poppins';font-weight:600;font-size:34px;letter-spacing:-.01em;color:#fff}
.brand .wm b{color:#35d4ae;font-weight:600}
.body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:40px;z-index:2}
.badge{
  width:312px;height:312px;border-radius:30px;
  background:rgba(53,212,174,.08);border:1.5px solid rgba(53,212,174,.34);
  box-shadow:0 0 90px rgba(53,212,174,.22);
  display:flex;align-items:center;justify-content:center;color:#35d4ae;
}
.badge svg{width:172px;height:172px;fill:none;stroke:currentColor;
  stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
.eyebrow{font-family:'Montserrat';font-weight:700;font-size:26px;letter-spacing:.18em;
  text-transform:uppercase;color:#35d4ae}
.headline{font-family:'Montserrat';font-weight:900;font-size:92px;line-height:1.04;
  letter-spacing:-.025em;color:#fff}
.headline b{color:#35d4ae;font-weight:900}
.sub{font-family:'Poppins';font-weight:500;font-size:34px;line-height:1.5;color:#CFCFCF;max-width:86%}
.foot{display:flex;align-items:center;justify-content:space-between;z-index:2}
.cta{display:inline-flex;align-items:center;gap:12px;background:#35d4ae;color:#0B0B0B;
  font-family:'Poppins';font-weight:600;font-size:36px;padding:32px 56px;border-radius:999px;
  box-shadow:0 14px 40px rgba(53,212,174,.28)}
.cta .ar{font-weight:600}
.dom{font-family:'Poppins';font-weight:500;font-size:26px;color:#8a8a8a;letter-spacing:.01em}
